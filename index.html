<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post de Gato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-post">
        <div class="topo-post">
            <img src="https://placekitten.com/40/40" alt="Foto de perfil" class="avatar">
            <div>
                <h4>AmanteDeGatos</h4>
                <p class="subtexto">Sexta-feira às 15:30</p>
            </div>
        </div>

        <img src="https://placekitten.com/500/350" alt="Gatinho fofo" class="imagem-post">

        <div class="conteudo-post">
            <p>Apenas mais um dia sendo incrivelmente fofo e dominando a casa inteira. 🐾 #GatosDoInstagram #Meow</p>
            
            <hr>

            <div class="botoes-post">
                <button id="botao-curtir" class="btn">❤️ Curtir (<span id="contador-curtidas">0</span>)</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
